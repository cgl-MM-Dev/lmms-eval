task: "task1"
dataset_path: json
dataset_kwargs:
  data_files: /Users/sunnyblack/Desktop/lmms-eval/test_lmm_eval/dataset/test.jsonl
test_split: train
output_type: generate_until
doc_to_text: !function utils.doc_to_text
doc_to_messages: !function utils.doc_to_messages
doc_to_answer: !function utils.doc_to_answer
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 4096
  temperature: 0.9
  top_p: 0.8
  num_beams: 1
  do_sample: false
# The return value of process_results will be used by metrics
process_results: !function utils.process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: LLM_JUDGE
    aggregation: !function utils.aggregate_results
    higher_is_better: true
  - metric: BLEU
    aggregation: !function utils.aggregate_results
    higher_is_better: true
  - metric: ROUGE
    aggregation: !function utils.aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
metadata:
  - version: 2.0
